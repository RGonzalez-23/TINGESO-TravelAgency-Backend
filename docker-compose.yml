version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: travel_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: travel_agency_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - shared_travel_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: .
    image: travel-backend:latest
    environment:
      - DB_URL=jdbc:mysql://db:3306/travel_agency_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USER=root
      - DB_PASSWORD=root
    deploy:
      replicas: 3
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shared_travel_net

volumes:
  db_data:

networks:
  # Definimos la red aquí. El backend será el encargado de crearla.
  shared_travel_net:
    name: travel_network
    driver: bridge
