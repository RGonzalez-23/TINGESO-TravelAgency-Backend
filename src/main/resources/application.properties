spring.application.name=BackendTingeso
server.port=8090

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# OAuth2 / Keycloak client (for auth code flow) and resource server issuer
spring.security.oauth2.client.registration.keycloak.client-id=travel-backend
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri=http://localhost:8090/login/oauth2/code/keycloak

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/travel-realm

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/travel-realm

# CORS frontend origin
app.frontend-origin=http://localhost:5173